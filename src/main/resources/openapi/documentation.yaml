openapi: 3.0.3

info:
  title: Lore Bible API
  description: API for managing users, characters, feats, relationships, and audit logs
  version: 1.0.0

servers:
  - url: http://localhost:8080

paths:

  /register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        "201":
          description: User registered successfully
        "409":
          description: Username already exists

  /login:
    post:
      summary: Login user and receive JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        "200":
          description: Login successful (JWT returned)
        "401":
          description: Invalid credentials

  /characters:
    get:
      summary: Get all characters (paginated + search)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            example: 1
        - name: size
          in: query
          schema:
            type: integer
            example: 10
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of characters

  /character:
    post:
      summary: Create a new character (multipart upload)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, role]
              properties:
                name:
                  type: string
                role:
                  type: string
                powerLevel:
                  type: integer
                abilities:
                  type: string
                race:
                  type: string
                age:
                  type: integer
                archetype:
                  type: string
                lore:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Character created

  /character/{id}:
    get:
      summary: Get character by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Character found
        "404":
          description: Character not found

    patch:
      summary: Update character partially
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CharacterUpdateRequest'
      responses:
        "200":
          description: Character updated
        "404":
          description: Character not found

    delete:
      summary: Delete character
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Character deleted
        "404":
          description: Character not found

  /characters/role/{roleName}:
    get:
      summary: Get characters by role
      security:
        - bearerAuth: []
      parameters:
        - name: roleName
          in: path
          required: true
          schema:
            type: string
            example: MAGE
        - name: page
          in: query
          schema:
            type: integer
        - name: size
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Characters by role
        "400":
          description: Invalid role

  /stats/archetype:
    get:
      summary: Get archetype counts
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Archetype statistics

  /relationships:
    post:
      summary: Add relationship between characters
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelationAdd'
      responses:
        "200":
          description: Relationship added

  /relationships/{id}:
    get:
      summary: Get relationships for a character
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Relationship list

  /character/{id}/feats:
    get:
      summary: Get feats of a character
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Feats list

    put:
      summary: Upsert feats for character
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeatRequest'
      responses:
        "200":
          description: Feats updated

  /character/{id}/feats/{category}:
    delete:
      summary: Delete feats by category
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: category
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Feat deleted

  /character/{id}/export:
    get:
      summary: Export character as markdown
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Markdown file returned

  /audit-logs:
    get:
      summary: Get audit logs for user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Audit logs retrieved

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    User:
      type: object
      properties:
        username:
          type: string
        password:
          type: string

    CharacterUpdateRequest:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
        powerLevel:
          type: integer
        abilities:
          type: array
          items:
            type: string
        imageUrl:
          type: string
        race:
          type: string
        age:
          type: integer
        archetype:
          type: string
        lore:
          type: string

    FeatRequest:
      type: object
      properties:
        category:
          type: string
        description:
          type: string

    RelationAdd:
      type: object
      properties:
        sourceId:
          type: integer
        targetId:
          type: integer
        type:
          type: string